<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мои ST-инструменты</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
  <style>
  /* Применяем текстуру к основному фону сайта */
  body {
    background-color: #1a1a1a; /* Запасной темный цвет, пока картинка грузится */
    background-image: url('assets/256_Wood Planks 02.png'); /* Путь к твоей картинке */
    background-repeat: repeat; /* Та самая команда, которая замостит экран бесшовно */
    
    /* Если паттерн слишком контрастный, можно его слегка "приглушить", 
       смешав с фоновым цветом: */
    background-blend-mode: multiply; 
  }

  /* Если из-за узора текст станет плохо читаться, 
     можно добавить полупрозрачную подложку под сам контент */
  .markdown-section {
    background-color: rgba(0, 0, 0, 0.75); /* Черная подложка с прозрачностью 75% */
    padding: 30px;
    border-radius: 12px; /* Немного скруглим углы для красоты */
  }
</style>
</head>
<body>
  <div id="app">Загрузка...</div>
  <script>
    window.$docsify = {
      name: 'Ethereal Tavern',
      repo: 'https://github.com/gromova-olga/Ethereal-Tavern',
      themeColor: '#8a2be2', 
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      // Эти две настройки говорят сайту: "сверни меню при загрузке"
      sidebarDisplayLevel: 1,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: { paths: 'auto', placeholder: 'Поиск...', noData: 'Ничего не найдено' }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
