<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мои ST-инструменты</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">Загрузка...</div>
  <script>
    window.$docsify = {
      name: 'Ethereal Tavern',
      repo: 'https://github.com/gromova-olga/Ethereal-Tavern',
      themeColor: '#8a2be2', 
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      sidebarDisplayLevel: 1,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: { paths: 'auto', placeholder: 'Поиск...', noData: 'Ничего не найдено' }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script>
    // Создаем плавающую кнопку
    const themeBtn = document.createElement('button');
    themeBtn.innerText = '🌗 Сменить тему';
  
    // Быстрый дизайн кнопки прямо в скрипте, чтобы она висела в углу
    themeBtn.style.cssText = 'position: fixed; bottom: 20px; right: 20px; z-index: 999; padding: 10px 15px; background: #333; color: #fff; border: 2px solid #555; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: bold;';

    // Вешаем клик: добавляем или убираем класс 'theme-metal' у всего сайта
    themeBtn.onclick = () => {
      document.body.classList.toggle('theme-metal');
    };

    // Помещаем кнопку на страницу
    document.body.appendChild(themeBtn);
    // Переключение темы (добавь вызов по клику на кнопку или при загрузке)
    function setTheme(theme) {
      if (theme === 'metal') {
        document.body.classList.add('theme-metal');
    } else {
      document.body.classList.remove('theme-metal');
    }
  }
  // Пример автовыбора (можно убрать)
  // setTheme('metal'); 
</script>
</body>
</html>
